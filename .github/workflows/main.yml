name: CI-CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t vishalbodkhe532/argocd-pipeline:${{ github.sha }} .

      - name: Push Docker image
        run: docker push vishalbodkhe532/argocd-pipeline:${{ github.sha }}

      - name: Update Kubernetes YAML
        run: |
          IMAGE_TAG=${{ github.sha }}
          
          python3 << 'EOF'
          import re, os
          
          filepath = 'k8s/deployment.yaml'
          image_tag = os.environ['IMAGE_TAG']
          
          # Read as raw bytes
          with open(filepath, 'rb') as f:
              raw = f.read()
          
          # Print what we see at start of file
          print("First 10 bytes:", raw[:10])
          
          # Remove any BOM variants
          raw = raw.replace(b'\xff\xfe', b'')  # UTF-16 LE BOM
          raw = raw.replace(b'\xfe\xff', b'')  # UTF-16 BE BOM
          raw = raw.replace(b'\xef\xbb\xbf', b'')  # UTF-8 BOM
          
          # Decode
          text = raw.decode('utf-16-le') if b'\x00' in raw[:20] else raw.decode('utf-8', errors='ignore')
          
          # Replace image line
          text = re.sub(
              r'image:.*argocd-pipeline:.*',
              f'image: vishalbodkhe532/argocd-pipeline:{image_tag}',
              text
          )
          
          # Write back as clean UTF-8
          with open(filepath, 'w', encoding='utf-8') as f:
              f.write(text)
          
          print("Success! Updated content:")
          print(text)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git