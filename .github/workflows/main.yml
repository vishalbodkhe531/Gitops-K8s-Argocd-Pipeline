name: CI-CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t vishalbodkhe532/argocd-pipeline:${{ github.sha }} .

      - name: Push Docker image
        run: docker push vishalbodkhe532/argocd-pipeline:${{ github.sha }}

      - name: Update Kubernetes YAML
        run: |
          IMAGE_TAG=${{ github.sha }}
          
          # Remove BOM and update image tag using python3
          python3 << 'EOF'
          import re, os
          
          filepath = 'k8s/deployment.yaml'
          
          with open(filepath, 'rb') as f:
              content = f.read()
          
          # Remove BOM if present
          content = content.replace(b'\xef\xbb\xbf', b'')
          
          # Decode to string
          text = content.decode('utf-8')
          
          # Replace image tag
          image_tag = os.environ['IMAGE_TAG']
          text = re.sub(
            r'image:.*argocd-pipeline:.*',
            f'image: vishalbodkhe532/argocd-pipeline:{image_tag}',
            text
          )
          
          # Write back
          with open(filepath, 'w', encoding='utf-8') as f:
              f.write(text)
          
          print("Done! New content:")
          print(text)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git