name: CI-CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t vishalbodkhe532/argocd-pipeline:${{ github.sha }} .

      - name: Push Docker image
        run: docker push vishalbodkhe532/argocd-pipeline:${{ github.sha }}

      - name: Update Kubernetes YAML
        run: |
          sed -i "s|image:.*|image: vishalbodkhe532/argocd-pipeline:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag" || echo "No changes to commit"
          git pull --rebase
          git push
